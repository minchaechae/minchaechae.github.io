<header id="site-header" class="fixed inset-x-0 top-0 z-50 transition-all duration-300">
  <nav class="mx-auto max-w-5xl px-6 flex items-center justify-between h-16">

    <!-- Logo / name -->
    <button data-scroll-to="#about"
      class="text-slate-900 font-semibold text-lg tracking-tight hover:text-accent-600 transition-colors duration-200 focus:outline-none">
      {{ site.data.profile.name }}
    </button>

    <!-- Desktop links -->
    <ul class="hidden md:flex items-center gap-1">
      <li>
        <button data-scroll-to="#about" data-nav-link="about"
          class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 focus:outline-none text-slate-600 hover:text-slate-900 hover:bg-slate-50">
          About
        </button>
      </li>
      <li>
        <button data-scroll-to="#publications" data-nav-link="publications"
          class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 focus:outline-none text-slate-600 hover:text-slate-900 hover:bg-slate-50">
          Publications
        </button>
      </li>
    </ul>

    <!-- Mobile hamburger -->
    <button id="menu-btn" aria-label="Toggle menu"
      class="md:hidden p-2 rounded-lg text-slate-600 hover:text-slate-900 hover:bg-slate-100 transition-colors focus:outline-none">
      <svg id="icon-hamburger" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg id="icon-close" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </nav>

  <!-- Mobile dropdown -->
  <div id="mobile-menu"
    class="md:hidden overflow-hidden transition-all duration-300 max-h-0 opacity-0 bg-white/95 backdrop-blur-md border-b border-slate-100">
    <ul class="px-6 pb-4 pt-2 flex flex-col gap-1">
      <li>
        <button data-scroll-to="#about"
          class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-slate-700 hover:text-slate-900 hover:bg-slate-50 transition-colors focus:outline-none">
          About
        </button>
      </li>
      <li>
        <button data-scroll-to="#publications"
          class="w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-slate-700 hover:text-slate-900 hover:bg-slate-50 transition-colors focus:outline-none">
          Publications
        </button>
      </li>
    </ul>
  </div>
</header>
