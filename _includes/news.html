<section id="news" class="py-16 bg-slate-50/60">
  <div class="mx-auto max-w-5xl px-6">

    <div class="fade-up">
      <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900 mb-6">
        News
        <span class="block mt-1.5 w-12 h-1 rounded-full bg-accent-400"></span>
      </h2>
    </div>

    <ul class="stagger-children max-w-2xl">
      {% for item in site.data.news %}
      <li class="animate fade-up flex gap-4 py-3.5 border-b border-slate-100 last:border-0">
        <span class="flex-shrink-0 text-xs font-semibold text-accent-600 bg-accent-50 rounded-md px-2 py-1 h-fit mt-0.5 whitespace-nowrap">
          {{ item.date }}
        </span>
        <span class="text-slate-600 text-sm leading-relaxed">{{ item.text }}</span>
      </li>
      {% endfor %}
    </ul>

  </div>
</section>
