<footer class="py-5 bg-slate-50 border-t border-slate-100">
  <div class="mx-auto max-w-5xl px-6 flex flex-col md:flex-row items-center justify-between gap-4">
    <p class="text-slate-400 text-sm">
      &copy; <span id="footer-year"></span>. {{ site.data.profile.name }}
    </p>
    {% if site.data.profile.links.email and site.data.profile.links.email != "" %}
    <div class="flex items-center gap-5">
      <a href="mailto:{{ site.data.profile.links.email }}"
        class="text-slate-400 text-sm hover:text-accent-600 transition-colors duration-200">
        {{ site.data.profile.links.email }}
      </a>
    </div>
    {% endif %}
  </div>
</footer>
